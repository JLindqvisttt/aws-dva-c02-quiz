<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Cert Study Portal</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
.portal-hero{text-align:center;padding:48px 24px 20px}
.portal-hero h1{font-size:2rem;font-weight:700;margin:0 0 10px}
.portal-hero h1 span{color:var(--accent)}
.portal-hero p{color:var(--text2);font-size:1.05rem;margin:0}
.portal-actions{display:flex;justify-content:center;gap:10px;padding:0 20px 24px;flex-wrap:wrap}
.portal-actions a{text-decoration:none}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:0 20px 48px}
.cert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;text-decoration:none;display:block;color:inherit}
.cert-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--cert-color)}
.cert-badge{display:inline-block;font-size:0.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--cert-color);color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:10px}
.cert-code{font-size:1.4rem;font-weight:800;margin:4px 0}
.cert-name{font-size:0.95rem;color:var(--text2);margin-bottom:10px}
.cert-desc{font-size:0.85rem;color:var(--text2);line-height:1.5;margin-bottom:14px}
.cert-topics{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.cert-topic{font-size:0.72rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--text2)}
.cert-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:10px}
.cert-qcount{font-size:0.8rem;color:var(--text2)}
.cert-btn{background:var(--cert-color);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap}
.cert-btn:hover{opacity:.85}
.cert-progress-wrap{margin-bottom:4px}
.cert-progress-label{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text2);margin-bottom:5px}
.cert-progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cert-progress-fill{height:100%;background:var(--cert-color);border-radius:3px;transition:width .5s}
.cert-card.coming-soon{opacity:.7}
.coming-soon-badge{position:absolute;top:14px;right:14px;font-size:0.7rem;font-weight:700;background:var(--border);color:var(--text2);padding:2px 8px;border-radius:20px}
.portal-nav{justify-content:space-between}
.nav-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.nav-title span{color:var(--text2);font-weight:400;font-size:.9rem}
@media(max-width:640px){.portal-hero h1{font-size:1.6rem}}
</style>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<nav class="portal-nav" style="display:flex;align-items:center;justify-content:space-between;padding:0 20px">
  <div class="nav-title">&#x2601; AWS Cert Study <span>Portal</span></div>
  <button class="theme-toggle" id="theme-toggle" onclick="togglePortalTheme()" title="Toggle light/dark mode">&#x1F319;</button>
</nav>
<div class="portal-hero">
  <h1>Choose your <span>AWS Certification</span></h1>
  <p>Practice with realistic quiz flows, track mastery, and build confidence before exam day.</p>
</div>
<div class="portal-actions"><a class="btn" href="feedback.html">Feedback and Features</a></div>
<div class="cert-grid" id="cert-grid"></div>
<script>
const CERTS = [
  { id:'clf-c02', code:'CLF-C02', name:'Cloud Practitioner', level:'Foundational', color:'#64748b', total:0, href:'coming-soon.html?cert=clf-c02', built:false, topics:['Cloud Concepts','Billing','Security','Core Services'], desc:'Foundational understanding of AWS cloud concepts and value.' },
  { id:'aif-c01', code:'AIF-C01', name:'AI Practitioner', level:'Foundational', color:'#6366f1', total:0, href:'coming-soon.html?cert=aif-c01', built:false, topics:['GenAI','ML Basics','AWS AI Services','Responsible AI'], desc:'Foundational AI and generative AI knowledge on AWS.' },
  { id:'soa-c02', code:'SOA-C02', name:'SysOps Administrator - Associate', level:'Associate', color:'#0ea5e9', total:0, href:'coming-soon.html?cert=soa-c02', built:false, topics:['Monitoring','Operations','Resilience','Security'], desc:'Deploy, manage, and operate workloads on AWS.' },
  { id:'dva-c02', code:'DVA-C02', name:'Developer - Associate', level:'Associate', color:'#f0962a', total:471, href:'dva-c02.html', built:true, topics:['Lambda','DynamoDB','API Gateway','CI/CD'], desc:'Develop, deploy, and debug cloud-based applications.' },
  { id:'saa-c03', code:'SAA-C03', name:'Solutions Architect - Associate', level:'Associate', color:'#3b82f6', total:30, href:'saa-c03.html', built:true, topics:['VPC','EC2','S3','RDS'], desc:'Design resilient and cost-optimized AWS architectures.' },
  { id:'dea-c01', code:'DEA-C01', name:'Data Engineer - Associate', level:'Associate', color:'#14b8a6', total:0, href:'coming-soon.html?cert=dea-c01', built:false, topics:['Data Lakes','ETL','Streaming','Governance'], desc:'Design and build data pipelines and analytics solutions.' },
  { id:'mla-c01', code:'MLA-C01', name:'Machine Learning Engineer - Associate', level:'Associate', color:'#8b5cf6', total:0, href:'coming-soon.html?cert=mla-c01', built:false, topics:['Feature Engineering','Training','MLOps','Inference'], desc:'Build, train, and deploy machine learning workloads.' },
  { id:'sap-c02', code:'SAP-C02', name:'Solutions Architect - Professional', level:'Professional', color:'#1d4ed8', total:0, href:'coming-soon.html?cert=sap-c02', built:false, topics:['Enterprise Architecture','Migration','Cost Control','Hybrid'], desc:'Advanced design for complex, large-scale AWS environments.' },
  { id:'dop-c02', code:'DOP-C02', name:'DevOps Engineer - Professional', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=dop-c02', built:false, topics:['Release Automation','Observability','Security','Reliability'], desc:'Operate and evolve delivery pipelines and production systems.' },
  { id:'ans-c01', code:'ANS-C01', name:'Advanced Networking - Specialty', level:'Specialty', color:'#0f766e', total:0, href:'coming-soon.html?cert=ans-c01', built:false, topics:['Hybrid Networking','Routing','DNS','Connectivity'], desc:'Advanced design and operation of AWS and hybrid networking.' },
  { id:'mls-c01', code:'MLS-C01', name:'Machine Learning - Specialty', level:'Specialty', color:'#7c3aed', total:0, href:'coming-soon.html?cert=mls-c01', built:false, topics:['ML Problem Framing','Modeling','Deployment','Optimization'], desc:'Advanced machine learning design and operations on AWS.' },
  { id:'scs-c02', code:'SCS-C02', name:'Security - Specialty', level:'Specialty', color:'#ef4444', total:30, href:'scs-c02.html', built:true, topics:['IAM','KMS','CloudTrail','GuardDuty'], desc:'Secure AWS workloads with layered controls and governance.' }
];
function readProgress(certId){try{var raw=localStorage.getItem('aws-quiz-progress-'+certId);if(!raw)return{mastered:0,seen:0};var p=JSON.parse(raw);var mastered=0,seen=0;for(var key in p){var e=p[key];if(e&&(e.correct>0||e.incorrect>0))seen++;if(e&&e.correct>=1)mastered++;}return{mastered:mastered,seen:seen};}catch(e){return{mastered:0,seen:0};}}
function buildCards(){var grid=document.getElementById('cert-grid');var html='';for(var i=0;i<CERTS.length;i++){var cert=CERTS[i];var prog=readProgress(cert.id);var pct=cert.total>0?Math.round((prog.mastered/cert.total)*100):0;var topics=cert.topics.map(function(t){return '<span class="cert-topic">'+t+'</span>';}).join('');var progressHtml=cert.built?('<div class="cert-progress-wrap"><div class="cert-progress-label"><span>Mastery</span><span>'+prog.mastered+' / '+cert.total+' questions</span></div><div class="cert-progress-bar"><div class="cert-progress-fill" style="width:'+pct+'%"></div></div></div>'):'';html+='<a class="cert-card'+(cert.built?'':' coming-soon')+'" href="'+cert.href+'" style="--cert-color:'+cert.color+'">'+(!cert.built?'<span class="coming-soon-badge">Coming Soon</span>':'')+'<div class="cert-badge">'+cert.level+'</div><div class="cert-code">'+cert.code+'</div><div class="cert-name">'+cert.name+'</div><div class="cert-desc">'+cert.desc+'</div><div class="cert-topics">'+topics+'</div>'+progressHtml+'<div class="cert-footer"><span class="cert-qcount">'+(cert.total>0?cert.total+' questions':'Question bank in progress')+'</span><button class="cert-btn" onclick="event.preventDefault();window.location=\''+cert.href+'\'">'+(cert.built?'Start Studying ->':'View Status ->')+'</button></div></a>'; }grid.innerHTML=html;}
function togglePortalTheme(){var html=document.documentElement;var current=html.getAttribute('data-theme');var next=current==='dark'?'light':'dark';html.setAttribute('data-theme',next);localStorage.setItem('theme',next);document.getElementById('theme-toggle').textContent=next==='dark'?'🌙':'☀️';}
(function(){var t=localStorage.getItem('theme')||'dark';document.getElementById('theme-toggle').textContent=t==='dark'?'🌙':'☀️';})();
buildCards();
</script>
</body>
</html>
