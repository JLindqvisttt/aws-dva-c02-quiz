<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Feedback and Feature Requests</title><link rel="stylesheet" href="style.css"><link rel="icon" type="image/svg+xml" href="favicon.svg"><style>.wrap{max-width:760px;margin:30px auto;padding:0 20px}.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}.form{display:grid;gap:12px}label{font-size:0.8rem;color:var(--text2);font-weight:600}input,select,textarea{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:0.9rem}textarea{min-height:150px;resize:vertical}.help{font-size:0.78rem;color:var(--text2)}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:640px){.row{grid-template-columns:1fr}}.ok{background:rgba(56,161,105,0.12);border:1px solid rgba(56,161,105,0.35);padding:10px 12px;border-radius:8px;color:var(--correct)}.err{background:rgba(229,62,62,0.12);border:1px solid rgba(229,62,62,0.35);padding:10px 12px;border-radius:8px;color:var(--wrong)}</style><script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script></head><body><nav style="display:flex;align-items:center;justify-content:space-between;padding:0 20px"><a class="btn" href="index.html" style="text-decoration:none"><- Back to Portal</a><button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button></nav><div class="wrap"><div class="panel"><h1 style="margin-bottom:8px">Feedback and Feature Requests</h1><p class="help" style="margin-bottom:16px">Messages are sent to your Slack channel via AWS API Gateway + Lambda.</p><div id="status"></div><form class="form" id="feedback-form"><div class="row"><div><label for="name">Name</label><input id="name" name="name" maxlength="80" placeholder="Your name" required></div><div><label for="email">Email (optional)</label><input id="email" name="email" type="email" maxlength="120" placeholder="name@example.com"></div></div><div class="row"><div><label for="type">Type</label><select id="type" name="type"><option value="feature">Feature request</option><option value="bug">Bug report</option><option value="question">Question</option><option value="other">Other</option></select></div><div><label for="cert">Certification (optional)</label><select id="cert" name="cert"><option value="">General</option><option>DVA-C02</option><option>SAA-C03</option><option>SCS-C02</option><option>CLF-C02</option><option>AIF-C01</option><option>SOA-C02</option><option>DEA-C01</option><option>MLA-C01</option><option>SAP-C02</option><option>DOP-C02</option><option>ANS-C01</option><option>MLS-C01</option></select></div></div><div><label for="message">Message</label><textarea id="message" name="message" maxlength="3000" placeholder="Describe your feedback, issue, or feature request" required></textarea></div><div class="help">Configure your API endpoint in window.FEEDBACK_API_URL below.</div><button class="btn btn-primary" type="submit" id="submit-btn">Send to Slack</button></form></div></div><script>window.FEEDBACK_API_URL='';window.FEEDBACK_API_TOKEN='';function toggleTheme(){var html=document.documentElement;var next=(html.getAttribute('data-theme')==='dark')?'light':'dark';html.setAttribute('data-theme',next);localStorage.setItem('theme',next);document.getElementById('theme-toggle').textContent=next==='dark'?'🌙':'☀️';}(function(){var t=localStorage.getItem('theme')||'dark';document.getElementById('theme-toggle').textContent=t==='dark'?'🌙':'☀️';})();function showStatus(kind,msg){var s=document.getElementById('status');s.className=kind;s.textContent=msg;}document.getElementById('feedback-form').addEventListener('submit',async function(e){e.preventDefault();if(!window.FEEDBACK_API_URL){showStatus('err','Feedback API URL is not configured yet. Open feedback.html and set window.FEEDBACK_API_URL.');return;}var btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Sending...';var payload={name:document.getElementById('name').value.trim(),email:document.getElementById('email').value.trim(),type:document.getElementById('type').value,cert:document.getElementById('cert').value,message:document.getElementById('message').value.trim(),source:'aws-cert-study-portal',page:location.href,ua:navigator.userAgent};try{var headers={'Content-Type':'application/json'};if(window.FEEDBACK_API_TOKEN){headers['x-feedback-token']=window.FEEDBACK_API_TOKEN;}var res=await fetch(window.FEEDBACK_API_URL,{method:'POST',headers:headers,body:JSON.stringify(payload)});var data=await res.json().catch(function(){return {};});if(!res.ok){throw new Error(data.error||('HTTP '+res.status));}showStatus('ok','Message sent successfully. Thanks for the feedback.');document.getElementById('feedback-form').reset();}catch(err){showStatus('err','Could not send feedback: '+err.message);}finally{btn.disabled=false;btn.textContent='Send to Slack';}});</script></body></html>
